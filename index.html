<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baloking Engineering Project Limited</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Animation definition */
        @keyframes slideDown {
            0% {
                opacity: 0;
                transform: translateY(-20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #111111;
            color: #ffffff;
        }

        /* Title Bar with your yellow/white mix and animation */
        .title-bar {
            background: linear-gradient(90deg, #f39c12, #ffffff);
            padding: 25px 15px;
            text-align: center;
            animation: slideDown 1s ease-out forwards;
        }

        .title-bar h1 {
            color: #111111;
            margin: 0;
            font-size: 1.5rem;
        }

        main {
            padding: 20px;
        }

        /* Styling for your contact section from your screenshots */
        .contact-row {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn-whatsapp {
            background-color: #25D366;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .btn-email {
            background-color: #f39c12;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
        }

        .instagram-handle {
            color: #ccc;
            font-size: 0.95rem;
        }

        footer {
            margin-top: 50px;
            text-align: center;
            border-top: 1px solid #333;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="title-bar">
        <h1>Baloking Engineering Project Limited</h1>
    </div>

    <main>
        <section>
            <div>
                <a href="https://wa.me/your-number-here?text=Baloking%20Engineering%2C%20I%20would%20like%20to%20inquire%20about%20your%20gas%20plant%20construction%20services." target="_blank" class="btn-whatsapp">
                    <i class="fa-brands fa-whatsapp"></i> WhatsApp
                </a>
                <a href="mailto:Balokingengineeringprojectltd@gmail.com" class="btn-email">
                    <i class="fa-solid fa-envelope"></i> Email Us
                </a>
            </div>

            <div class="contact-row">
                <p style="color: #f39c12; font-size: 0.95rem; margin: 0;">
                    <i class="fa-solid fa-envelope"></i> Balokingengineeringprojectltd@gmail.com
                </p>
                <span class="instagram-handle">
                    <i class="fa-brands fa-instagram"></i> @Baloking_gas_ng
                </span>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Baloking Engineering Project Limited. All Rights Reserved.</p>
    </footer>

</body>
</html>
